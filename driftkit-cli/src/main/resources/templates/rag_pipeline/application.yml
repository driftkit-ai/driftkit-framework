server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: /*PROJECT_NAME*/
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/rag-pipeline}
      auto-index-creation: true

driftkit:
  clients:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-4
      temperature: 0.7
      max-tokens: 2000
      
  embedding:
    default-model: openai
    openai:
      model: text-embedding-3-small
      dimensions: 1536
      
  vector:
    default-store: in-memory
    stores:
      in-memory:
        enabled: true
        max-documents: 10000
      pinecone:
        enabled: false
        api-key: ${PINECONE_API_KEY:}
        environment: ${PINECONE_ENVIRONMENT:}
        index-name: ${PINECONE_INDEX:rag-documents}
        
  rag:
    chunk-size: 1000
    chunk-overlap: 200
    retrieval:
      max-results: 5
      min-score: 0.7
    document-processing:
      supported-formats:
        - pdf
        - txt
        - docx
        - html
        - md
        - json
        - csv
      max-file-size-mb: 50
      
# Document storage
document:
  storage:
    path: ${DOCUMENT_STORAGE_PATH:./documents}
    create-if-missing: true
    
# Logging
logging:
  level:
    ai.driftkit: DEBUG
    /*PACKAGE_NAME*/: DEBUG
    org.apache.tika: WARN
    org.apache.pdfbox: WARN