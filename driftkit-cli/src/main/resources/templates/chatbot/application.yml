server:
  port: 8080

spring:
  application:
    name: /*PROJECT_NAME*/

driftkit:
  clients:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-4
      temperature: 0.7
      max-tokens: 2000
    
  workflows:
    enabled: true
    
  chat-assistant:
    enabled: true
    session:
      timeout: 30m
      max-sessions: 100
    
# Logging
logging:
  level:
    ai.driftkit: DEBUG
    /*PACKAGE_NAME*/: DEBUG