server:
  port: 8080

spring:
  application:
    name: /*PROJECT_NAME*/
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/spring-ai-driftkit}
      auto-index-creation: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-3-small

driftkit:
  spring-ai:
    application-name: /*PROJECT_NAME*/
    tracing:
      enabled: true
    chat-client:
      enabled: true
    memory:
      enabled: true
      max-messages: 100
      
  context-engineering:
    storage:
      type: mongodb
    api:
      enabled: true
      base-path: /api/prompts
      
# Prompt Management
prompts:
  default-language: ENGLISH
  fallback-enabled: true
  cache:
    enabled: true
    ttl: 3600
    
# Logging
logging:
  level:
    ai.driftkit: DEBUG
    /*PACKAGE_NAME*/: DEBUG
    org.springframework.ai: DEBUG