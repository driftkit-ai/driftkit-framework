spring:
  application:
    name: /*PROJECT_NAME*/
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017//*PROJECT_NAME*/}
      auto-index-creation: true

server:
  port: 8080

# DriftKit Configuration
driftkit:
  # Context Engineering with MongoDB backend
  context-engineering:
    enabled: true
    frontend:
      enabled: true
  
  promptService:
    name: mongodb
    config:
      collection: prompts
  
  vectorStore:
    name: mongodb
    config:
      collection: vectors
      dimension: 1536
  
  # AI Model Configuration
  vault:
    - name: openai
      api-key: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL:gpt-4}
      temperature: 0.7
      max-tokens: 4000
      tracing: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    ai.driftkit: INFO
    com.example: DEBUG
    org.springframework.data.mongodb: DEBUG