plugins {
    id 'java'
    id 'org.springframework.boot' version '/*SPRING_BOOT_VERSION*/'
    id 'io.spring.dependency-management' version '1.1.0'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_/*JAVA_VERSION*/
    targetCompatibility = JavaVersion.VERSION_/*JAVA_VERSION*/
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/milestone' }
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter'
    
    // DriftKit
    implementation 'ai.driftkit:driftkit-common:/*DRIFTKIT_VERSION*/'
    implementation 'ai.driftkit:driftkit-clients-spring-boot-starter:/*DRIFTKIT_VERSION*/'
    implementation 'ai.driftkit:driftkit-workflows-spring-boot-starter:/*DRIFTKIT_VERSION*/'
    
    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    
    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}